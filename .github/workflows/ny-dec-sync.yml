name: NY DEC Part 364 Sync

on:
  # Run on the 6th of each month at 3am UTC
  schedule:
    - cron: "0 3 6 * *"
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  import-ny-dec:
    name: Import NY DEC Part 364 waste transporter permits
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests pandas supabase

      - name: Run NY DEC Part 364 importer
        run: python pipelines/ny-dec-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
