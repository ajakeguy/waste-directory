name: MA DEP Hazardous Waste Transporter Sync

# Note: mass.gov blocks automated PDF downloads (403).
# Before running this workflow, manually download the PDF from a browser:
#   https://www.mass.gov/doc/massdep-licensed-hazardous-waste-transporter-list-0/download
# Save it as: pipelines/ma-dep-hw-import/data/ma_hw_transporters.pdf
# Then commit the file and re-run this workflow.

on:
  # Monthly on the 10th at 2am UTC
  schedule:
    - cron: "0 2 10 * *"
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  import-ma-dep-hw:
    name: Import MA DEP licensed hazardous waste transporters
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pdfplumber supabase

      - name: Run MA DEP hazardous waste transporter importer
        run: python pipelines/ma-dep-hw-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
