name: NY DEC Part 364 Hauler Sync

on:
  workflow_dispatch:

jobs:
  import-ny-haulers:
    name: Import NY DEC Part 364 haulers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pandas openpyxl supabase

      - name: Run NY DEC Part 364 hauler importer
        run: python pipelines/ny-dec-364-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
