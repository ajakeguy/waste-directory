name: NJ Recycling Facility Sync

on:
  # schedule:
  #   # Monthly on the 15th at 03:00 UTC
  #   - cron: "0 3 15 * *"
  workflow_dispatch:

jobs:
  sync:
    name: Import NJ DEP Recycling Facilities
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pdfplumber beautifulsoup4 supabase

      - name: Run NJ recycling import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python pipelines/nj-recycling-import/index.py
