name: NH DES Hauler Sync

on:
  # Run on the 8th of each month at 3am UTC
  schedule:
    - cron: "0 3 8 * *"
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  import-nh-des:
    name: Import NH DES registered solid waste haulers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests pandas beautifulsoup4 pdfplumber supabase

      - name: Run NH DES hauler importer
        run: python pipelines/nh-des-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
