name: NH DES Hauler Sync

on:
  # Manual runs only — the CSV is checked into the repo and updated by hand
  workflow_dispatch:

jobs:
  import-nh-des:
    name: Import NH DES registered solid waste haulers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests pandas supabase

      - name: Run NH DES hauler importer
        run: python pipelines/nh-des-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
