name: ME DEP Hauler Sync

on:
  # Run on the 9th of each month at 3am UTC
  schedule:
    - cron: "0 3 9 * *"
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  import-me-dep:
    name: Download and import Maine DEP non-hazardous transporters
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests pdfplumber beautifulsoup4 pandas supabase

      - name: Run ME DEP importer
        run: python pipelines/me-dep-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
