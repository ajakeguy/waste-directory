# Disabled - CT has no statewide solid waste transporter list
# CT DEEP only regulates hazardous waste; solid waste is permitted at the municipal level.
# Re-enable if CT publishes a statewide list in the future.
name: CT DEEP Hauler Sync

on:
  # on: [workflow_dispatch]
  workflow_dispatch:

jobs:
  import-ct-deep:
    name: Download and import CT DEEP waste transporters
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests pdfplumber supabase

      - name: Run CT DEEP importer
        run: python pipelines/ct-deep-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
