name: NYC BIC License Sync

on:
  # Run on the 4th of each month at 3am UTC
  schedule:
    - cron: "0 3 4 * *"
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  import-nyc-bic:
    name: Import NYC BIC licensed trade waste haulers
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install supabase requests

      - name: Run NYC BIC importer
        run: python pipelines/nyc-bic-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
