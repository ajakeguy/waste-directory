name: MA Municipal Hauler Sync

on:
  workflow_dispatch:

jobs:
  import-ma-haulers:
    name: Import MA municipal haulers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install supabase

      - name: Run MA municipal hauler importer
        run: python pipelines/ma-hauler-import/index.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
